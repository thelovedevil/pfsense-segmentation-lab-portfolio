---
# Phase 15 — Commercial WireGuard VPN egress tunnel + monitored gateway
# Source of truth: group_vars/all.yml  (vpn.*, gateways.vpn_gw)  +  vault (keys)
#
# pfSense CE fully supports WireGuard (VPN > WireGuard; config in config.xml). The
# only gap is the Ansible collection: pfsensible.core has no pfsense_wireguard_*
# module (and pfsense_rewrite_config only REFORMATS config.xml — it cannot inject
# sections), so the tunnel/peer are created once in the GUI; this phase then assigns
# the interface and adds the monitored gateway. Provider keys come from the gitignored vault.

- name: VPN egress interface + monitored gateway
  hosts: pfsense
  gather_facts: false
  collections: [pfsensible.core]

  tasks:
    - name: Snapshot config.xml
      ansible.builtin.fetch:
        src: /conf/config.xml
        dest: "snapshots/config_pre_vpn_{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}.xml"
        flat: true
      tags: snapshot

    - name: "[VERIFY] WireGuard tunnel/peer exist (created in the GUI)"
      ansible.builtin.debug:
        msg: >
          Confirm the WireGuard tunnel ({{ hardware.vpn_egress_if }}) and peer are present
          under VPN > WireGuard, populated from the vault values. pfsensible has no
          WireGuard module, so this one object is GUI-owned; Ansible owns everything else.

    - name: Assign the VPN tunnel as an interface (VPNEGRESS)
      pfsense_interface:
        interface: "{{ hardware.vpn_egress_if }}"
        descr: VPNEGRESS
        enable: true
        ipv4_type: static                                        # gateway needs an IPv4 on the iface
        ipv4_address: "{{ vpn.interface_address.split('/')[0] }}"  # the tunnel address (e.g. 10.2.0.2)
        ipv4_prefixlen: 32
        mtu: 1420                                                # WireGuard overhead; avoids drops
        state: present

    # Gateway — ICMP monitoring disabled because many VPN providers' server-side NAT
    # rewrites ICMP echo-reply destinations, so dpinger never sees responses.
    # Kill-switch still works via skip_rules_gw_down + gw_down_kill_states (Phase 25).
    - name: VPN gateway (monitoring disabled — provider NAT breaks dpinger)
      pfsense_gateway:
        name: "{{ gateways.vpn_gw }}"
        interface: VPNEGRESS
        gateway: "{{ vpn.gateway_ip }}"     # far-side tunnel IP (e.g. 10.2.0.1); not "dynamic"
        nonlocalgateway: true               # it sits outside the /32 interface subnet
        monitor_disable: "{{ vpn.monitor_disable }}"
        state: present

    # DNS hardening — automated via phpshell (pfsensible has no unbound module).
    # Prevents ISP DHCP from injecting DNS + forces Unbound to forward via VPN.
    - name: "DNS — pin servers to VPN, disable DHCP override, enable forwarding"
      pfsense_phpshell:
        cmd: |
          $changed = false;

          // Remove dnsallowoverride (absence = disabled; blocks ISP DHCP DNS injection)
          if (isset($config['system']['dnsallowoverride'])) {
            unset($config['system']['dnsallowoverride']);
            $changed = true;
          }

          // Set DNS servers pinned to VPN gateway
          $want_servers = array(
          {% for s in dns.servers %}
            '{{ s.ip }}',
          {% endfor %}
          );
          $current = isset($config['system']['dnsserver']) ? $config['system']['dnsserver'] : array();
          if ($current != $want_servers) {
            $config['system']['dnsserver'] = $want_servers;
            $changed = true;
          }

          // Pin each DNS server to the VPN gateway
          {% for s in dns.servers %}
          if (!isset($config['system']['dns{{ loop.index }}gw']) || $config['system']['dns{{ loop.index }}gw'] != '{{ s.gateway }}') {
            $config['system']['dns{{ loop.index }}gw'] = '{{ s.gateway }}';
            $changed = true;
          }
          {% endfor %}

          if ($changed) {
            write_config("ansible: DNS servers pinned to VPN, DHCP override disabled");
            system_resolvconf_generate(true);
          }

    - name: "DNS — Unbound forwarding mode + outgoing interface + disable IPv6"
      pfsense_phpshell:
        cmd: |
          $changed = false;

          // Enable forwarding mode (Unbound forwards to configured servers, not root-resolver)
          if (!isset($config['unbound']['forwarding'])) {
            $config['unbound']['forwarding'] = '';
            $changed = true;
          }

          // Set outgoing interface to VPN tunnel
          if (!isset($config['unbound']['outgoing_interface']) || $config['unbound']['outgoing_interface'] != '{{ dns.outgoing_interface }}') {
            $config['unbound']['outgoing_interface'] = '{{ dns.outgoing_interface }}';
            $changed = true;
          }

          // Disable IPv6 DNS via custom_options
          {% if not dns.do_ipv6 %}
          $want = 'do-ip6: no';
          if (!isset($config['unbound']['custom_options']) || $config['unbound']['custom_options'] != $want) {
            $config['unbound']['custom_options'] = $want;
            $changed = true;
          }
          {% endif %}

          if ($changed) {
            write_config("ansible: Unbound forwarding via VPN, IPv6 disabled");
            services_unbound_configure(true);
          }
