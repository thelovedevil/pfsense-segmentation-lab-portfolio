---
# FreeBSD host — VLAN legs, VNET jails, Samba on the store jail.
# Target: inventory group 'freebsd' (the FreeBSD HOST — a different machine from the firewall).
# VNET networking has version-specific nuances — verify each jail comes up with the
# expected address + default route before relying on it.

- name: Ensure python3 present
  ansible.builtin.raw: pkg install -y python3
  changed_when: false

- name: Render segmentation network config (VLAN legs + bridges)
  ansible.builtin.template:
    src: rc.conf.segmentation.j2
    dest: /etc/rc.conf.d/segmentation
    mode: "0644"
  notify: reload network

- name: Host is NOT a router; jails enabled at boot
  community.general.sysrc:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: gateway_enable, value: "NO" }
    - { name: jail_enable, value: "YES" }
    - { name: jail_parallel_start, value: "YES" }

- name: Render jail.conf (VNET jails)
  ansible.builtin.template:
    src: jail.conf.j2
    dest: /etc/jail.conf
    mode: "0644"

- name: Host SSH hardening (key-only)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.re }}"
    line: "{{ item.line }}"
  loop:
    - { re: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { re: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
  notify: restart sshd

- name: Host sysctl hardening
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    regexp: "^{{ item.name }}="
    line: "{{ item.name }}={{ item.value }}"
    create: true
    mode: "0644"
  loop:
    - { name: net.inet.tcp.blackhole, value: "2" }
    - { name: net.inet.udp.blackhole, value: "1" }
    - { name: net.inet.ip.random_id, value: "1" }
  notify: reload sysctl

# ── Samba inside the store jail — host writes into the jail's filesystem ──
- name: Render the store jail's smb4.conf
  ansible.builtin.template:
    src: smb4.conf.j2
    dest: /jails/store/usr/local/etc/smb4.conf
    mode: "0644"
  tags: samba

- name: Install + enable Samba in the store jail (verify pkg name per release)
  ansible.builtin.raw: |
    jexec store sh -c 'pkg install -y samba419 2>/dev/null || pkg install -y samba416' &&
    jexec store sysrc samba_server_enable=YES &&
    jexec store service samba_server restart
  changed_when: true
  tags: samba
