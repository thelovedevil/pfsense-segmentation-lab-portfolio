all:
  hosts:
    pfsense:
      ansible_host: 192.0.2.1              # firewall management IP (during build: your existing flat LAN)
      ansible_connection: ssh
      ansible_user: admin
      ansible_python_interpreter: /usr/local/bin/python3.11   # pfSense ships versioned python (no bare python3)

  children:
    # The FreeBSD HOST that runs the VNET jails (segmentation services tier).
    freebsd:
      hosts:
        freebsd_host:
          ansible_host: 10.0.10.5          # host mgmt leg on the MGMT VLAN
          ansible_user: ansible            # non-root sudo user, key-based auth
          ansible_become: true
          ansible_python_interpreter: /usr/local/bin/python3

    # OPTIONAL — populate to AUTOMATE the reachability matrix in 99_validate.yml.
    # Leave empty to just print the manual command table.
    lab:
      hosts: {}
        # bastion:  { ansible_host: 10.0.10.10 }
        # operator: { ansible_host: 10.0.20.20 }
        # store:    { ansible_host: 10.0.30.10 }
