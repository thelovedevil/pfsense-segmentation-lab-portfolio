[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = True
vault_password_file = .vault_pass
remote_user         = admin
private_key_file    = ~/.ssh/pfsense_ansible
retry_files_enabled = False
result_format       = yaml          # was: stdout_callback = yaml (removed in community.general 12)

[ssh_connection]
pipelining = True
